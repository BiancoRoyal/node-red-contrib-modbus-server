name: "Feature Request"
description: Request a new feature for the Modbus Server nodes
labels:
  - feature
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the requested feature
      description: |
        Describe the feature you would like to see added to `node-red-contrib-modbus-server`
        (Modbus-Server, Modbus-Server-TLS, or Modbus-Server-Demo).
        Feel free to attach diagrams or screenshots.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: |
        Describe why you would like to see this feature or the use-case for the feature.
        For Modbus **client** functionality, please use the
        [node-red-contrib-modbus](https://github.com/biancoroyal/node-red-contrib-modbus) repository instead.
    validations:
      required: true
