<script type="text/javascript">
  RED.nodes.registerType('modbus-server-demo', {
    category: 'modbus',
    color: '#E9967A',
    defaults: {
      name: {value: ''},
      logEnabled: {value: false},
      hostname: {value: '0.0.0.0'},
      serverPort: {value: 10502, validate: RED.validators.number()},
      responseDelay: {value: 100, validate: RED.validators.number()},
      delayUnit: {value: 'ms'},
      showStatusActivities: {value: false},
      showErrors: {value: false},
      // Buffer sizes
      coilsBufferSize: {value: 10000, validate: RED.validators.number()},
      holdingBufferSize: {value: 10000, validate: RED.validators.number()},
      inputBufferSize: {value: 10000, validate: RED.validators.number()},
      discreteBufferSize: {value: 10000, validate: RED.validators.number()},
      // Demo settings
      demoDataPattern: {value: 'sequential'},
      demoUpdateInterval: {value: 1000, validate: RED.validators.number()},
      demoAutoStart: {value: true},
      demoRandomSeed: {value: null},
      demoValueMin: {value: 0, validate: RED.validators.number()},
      demoValueMax: {value: 65535, validate: RED.validators.number()},
      // Advanced demo features
      demoRealisticMode: {value: false},
      demoDeviceSimulation: {value: 'generic'},
      demoErrorRate: {value: 0, validate: function(v) { return v >= 0 && v <= 1 }}
    },
    inputs: 1,
    outputs: 1,
    icon: "modbus.png",
    paletteLabel: "Modbus-Demo-Server",
    label: function () {
      return this.name || "Modbus Demo Server " + this.serverPort
    },
    info: function () {
      return "Modbus Demo Server with automatic data generation for testing and development."
    },
    oneditprepare: function() {
      let tabs = RED.tabs.create({
        id: "node-input-modbus-demo-tabs",
        onchange: function(tab) {
          $("#node-input-tabs-content").children().hide()
          $("#" + tab.id).show()
        }
      })

      tabs.addTab({
        id: "modbus-demo-settings-tab",
        label: "Server Settings"
      })

      tabs.addTab({
        id: "modbus-demo-data-tab",
        label: "Demo Data"
      })

      tabs.addTab({
        id: "modbus-demo-simulation-tab",
        label: "Realistic Device Simulation"
      })

      tabs.addTab({
        id: "modbus-demo-buffers-tab",
        label: "Buffer Sizes"
      })

      tabs.addTab({
        id: "modbus-demo-options-tab",
        label: "Server Options"
      })

      // Handle realistic mode toggle
      $('#node-input-demoRealisticMode').change(function() {
        if($(this).is(':checked')) {
          $('.realistic-options').show()
        } else {
          $('.realistic-options').hide()
        }
      })

      // Initialize realistic options visibility
      if($('#node-input-demoRealisticMode').is(':checked')) {
        $('.realistic-options').show()
      } else {
        $('.realistic-options').hide()
      }
    }
  })
</script>

</script>

<script type="text/x-red" data-help-name="modbus-server-demo">
  <p>Modbus Demo Server with automatic data generation for testing and development.</p>
  
  <h3>Features</h3>
  <ul>
    <li>Automatic data generation with various patterns (sequential, random, sine wave, etc.)</li>
    <li>Realistic device simulation modes (temperature sensors, motors, PLCs, etc.)</li>
    <li>Configurable update intervals and value ranges</li>
    <li>Support for all Modbus data types (coils, discrete inputs, holding registers, input registers)</li>
    <li>Error injection for testing error handling</li>
    <li>Reproducible random data with seed support</li>
  </ul>
  
  <h3>Configuration</h3>
  
  <h4>Server Settings</h4>
  <p>Configure the host and port for the Modbus server. Default port is 10502 to avoid conflicts with standard Modbus port 502.</p>
  
  <h4>Demo Data</h4>
  <p>Configure how demo data is generated:</p>
  <ul>
    <li><b>Data Pattern:</b> Choose from sequential, random, sine wave, square wave, sawtooth, or mixed patterns</li>
    <li><b>Update Interval:</b> How often the data updates (in milliseconds)</li>
    <li><b>Value Range:</b> Minimum and maximum values for generated data</li>
    <li><b>Random Seed:</b> Optional seed for reproducible random sequences</li>
    <li><b>Auto Start:</b> Start generating data automatically when the flow starts</li>
  </ul>
  
  <h4>Realistic Device Simulation</h4>
  <p>Enable realistic mode to simulate actual industrial devices with appropriate characteristics:</p>
  <ul>
    <li><b>Temperature Sensors:</b> Simulates temperature with realistic drift and noise</li>
    <li><b>Pressure Sensors:</b> Simulates pressure readings with appropriate variations</li>
    <li><b>Flow Meters:</b> Simulates flow measurements with turbulence effects</li>
    <li><b>Motor Controller:</b> Simulates motor states, speeds, and feedback</li>
    <li><b>PLC Simulation:</b> Simulates a complete PLC with various I/O points</li>
  </ul>
  
  <h4>Buffer Sizes</h4>
  <p>Configure the size of each data buffer. Larger buffers allow more addresses but use more memory.</p>
  
  <h4>Server Options</h4>
  <ul>
    <li><b>Response Delay:</b> Simulated delay before responding to requests</li>
    <li><b>Show Status:</b> Display server activity in node status</li>
    <li><b>Show Errors:</b> Display errors in debug sidebar</li>
    <li><b>Debug Logging:</b> Enable detailed debug output</li>
  </ul>
  
  <h3>Usage</h3>
  <p>This node is perfect for:</p>
  <ul>
    <li>Testing Modbus client implementations</li>
    <li>Development without physical hardware</li>
    <li>Load testing and performance analysis</li>
    <li>Training and demonstrations</li>
    <li>Protocol debugging</li>
  </ul>
  
  <h3>Outputs</h3>
  <p>The node outputs messages for each Modbus request received, including:</p>
  <ul>
    <li><code>msg.topic</code> - The type of request (read/write)</li>
    <li><code>msg.payload</code> - The request details</li>
    <li><code>msg.modbusRequest</code> - Complete Modbus request information</li>
  </ul>
</script>
